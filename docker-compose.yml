services:
  postgres:
    image: postgres:15-alpine
    container_name: fenix_postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fenix_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fenix_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fenix_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: fenix-educacao_backend
    container_name: fenix_backend
    environment:
      APP_NAME: "Fenix Educacao"
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8885
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: sync
    ports:
      - "8885:8000"
    volumes:
      - backend_storage:/var/www/html/storage
      - ./backend/routes:/var/www/html/routes
      - ./backend/database:/var/www/html/database
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fenix_network

  frontend:
    image: fenix-educacao_frontend
    container_name: fenix_frontend
    environment:
      VITE_API_URL: http://localhost:8885/api/v1
    ports:
      - "8004:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - fenix_network
    command: npm run dev

networks:
  fenix_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_storage:
  frontend_node_modules:
